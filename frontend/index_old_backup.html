<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJ Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0d0d0d;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
  }

  /* Sidebar */
  #sidebar {
    width: 260px;
    background: #111;
    border-right: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  #sidebar-header {
    padding: 16px;
    border-bottom: 1px solid #2a2a2a;
  }

  #new-chat-btn {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #333;
    background: transparent;
    color: #7c8aff;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }

  #new-chat-btn:hover { background: #1a1a1a; }

  #chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .chat-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: #aaa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.2s;
    margin-bottom: 2px;
  }

  .chat-item:hover { background: #1a1a1a; }
  .chat-item.active { background: #222; color: #7c8aff; font-weight: 600; }

  /* Main area */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 24px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    text-align: center;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #7c8aff;
  }

  header p {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
  }

  .settings-btn {
    position: absolute;
    right: 24px;
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid #333;
    background: transparent;
    color: #888;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
  }

  .settings-btn:hover { background: #222; color: #7c8aff; }

  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg-row {
    display: flex;
    gap: 10px;
    max-width: 80%;
  }

  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.assistant { align-self: flex-start; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.user-avatar { background: #7c8aff; color: #fff; }
  .avatar.mj-avatar { background: #2a2a2a; color: #7c8aff; }

  .msg-content { flex: 1; }

  .msg {
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .msg.user {
    background: #7c8aff;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    background: #1e1e1e;
    color: #d0d0d0;
    border-bottom-left-radius: 4px;
  }

  .msg.typing {
    color: #888;
    font-style: italic;
  }

  .timestamp {
    font-size: 11px;
    color: #555;
    margin-top: 4px;
    padding: 0 4px;
  }

  .msg-row.user .timestamp { text-align: right; }

  #input-bar {
    display: flex;
    gap: 8px;
    padding: 16px 24px;
    background: #1a1a1a;
    border-top: 1px solid #2a2a2a;
  }

  #user-input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #111;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  #user-input:focus { border-color: #7c8aff; }

  #send-btn {
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    background: #7c8aff;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  #send-btn:hover { background: #6b79ee; }
  #send-btn:disabled { background: #444; cursor: not-allowed; }

  #mic-btn {
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #333;
    background: transparent;
    color: #e0e0e0;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  #mic-btn:hover { background: #222; }
  #mic-btn.recording { background: #ff4444; color: #fff; border-color: #ff4444; }

  #mic-status {
    font-size: 11px;
    color: #666;
    text-align: center;
    padding: 4px;
    background: #111;
    border-top: 1px solid #1a1a1a;
  }

  #mic-status.wake { color: #7c8aff; }
  #mic-status.command { color: #44ff44; }

  .speak-btn {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 13px;
    padding: 2px 4px;
    margin-left: 8px;
    transition: color 0.2s;
  }

  .speak-btn:hover { color: #7c8aff; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <button id="new-chat-btn">+ New Chat</button>
  </div>
  <div id="chat-list"></div>
</div>

<div id="main">
  <header>
    <div>
      <h1>MJ Assistant</h1>
      <p>Phase 1 — Chat</p>
    </div>
    <a href="/static/settings.html" class="settings-btn">Voice Settings</a>
  </header>

  <div id="chat-container"></div>

  <div id="input-bar">
    <button id="mic-btn" title="Voice input">&#127908;</button>
    <input id="user-input" type="text" placeholder="Type your message..." autocomplete="off">
    <button id="send-btn">Send</button>
  </div>
  <div id="mic-status">Mic: off</div>
</div>

<script>
const API = window.location.origin;
const chatBox = document.getElementById("chat-container");
const input = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const chatList = document.getElementById("chat-list");

function addMsg(text, role, time) {
  const row = document.createElement("div");
  row.className = `msg-row ${role}`;

  const avatar = document.createElement("div");
  avatar.className = `avatar ${role === "user" ? "user-avatar" : "mj-avatar"}`;
  avatar.textContent = role === "user" ? "U" : "MJ";

  const content = document.createElement("div");
  content.className = "msg-content";

  const msg = document.createElement("div");
  msg.className = `msg ${role}`;
  msg.textContent = text;

  const footer = document.createElement("div");
  footer.className = "timestamp";
  footer.textContent = time || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  if (role === "assistant") {
    const speakBtn = document.createElement("button");
    speakBtn.className = "speak-btn";
    speakBtn.innerHTML = "&#128264;";
    speakBtn.title = "Listen";
    speakBtn.addEventListener("click", () => speakText(msg.textContent));
    footer.appendChild(speakBtn);
  }

  content.appendChild(msg);
  content.appendChild(footer);
  row.appendChild(avatar);
  row.appendChild(content);
  chatBox.appendChild(row);
  chatBox.scrollTop = chatBox.scrollHeight;
  return msg;
}

// Load sidebar chat list
async function loadChatList() {
  try {
    const res = await fetch(API + "/chats");
    const data = await res.json();
    chatList.innerHTML = "";
    for (const chat of data.chats) {
      const item = document.createElement("div");
      item.className = "chat-item" + (chat.id === data.active ? " active" : "");
      item.textContent = chat.title;
      item.addEventListener("click", () => selectChat(chat.id));
      chatList.appendChild(item);
    }
  } catch (e) {}
}

// Select a chat from sidebar
async function selectChat(chatId) {
  try {
    const res = await fetch(API + "/select-chat/" + chatId, { method: "POST" });
    const data = await res.json();
    chatBox.innerHTML = "";
    for (const msg of data.history) {
      addMsg(msg.content, msg.role === "user" ? "user" : "assistant");
    }
    loadChatList();
  } catch (e) {}
}

// Load current chat history on page open
async function loadHistory() {
  try {
    const res = await fetch(API + "/history");
    const data = await res.json();
    for (const msg of data.history) {
      addMsg(msg.content, msg.role === "user" ? "user" : "assistant");
    }
  } catch (e) {}
}

loadHistory();
loadChatList();

async function send() {
  const text = input.value.trim();
  if (!text) return;

  // Handle /remember command
  if (text.startsWith("/remember ")) {
    const fact = text.slice(10).trim();
    addMsg(text, "user");
    input.value = "";
    await fetch(API + "/remember", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ fact: fact }),
    });
    addMsg("Saved to permanent memory: " + fact, "assistant");
    return;
  }

  addMsg(text, "user");
  input.value = "";
  sendBtn.disabled = true;

  const typing = addMsg("Thinking...", "assistant typing");

  try {
    const res = await fetch(API + "/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text }),
    });

    if (!res.ok) throw new Error(`Server error: ${res.status}`);

    typing.textContent = "";
    typing.classList.remove("typing");
    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    let detectedEmotion = "neutral";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      for (const line of chunk.split("\n")) {
        if (line.startsWith("data: ") && line !== "data: [DONE]") {
          const data = JSON.parse(line.slice(6));
          if (data.token) {
            typing.textContent += data.token;
            chatBox.scrollTop = chatBox.scrollHeight;
          }
          if (data.emotion) {
            detectedEmotion = data.emotion;
          }
        }
      }
    }

    // Speak the reply with detected emotion
    speakText(typing.textContent, detectedEmotion);

    // Refresh sidebar to show updated title
    loadChatList();

  } catch (err) {
    typing.textContent = `Error: ${err.message}`;
    typing.classList.remove("typing");
  }

  sendBtn.disabled = false;
  input.focus();
}

sendBtn.addEventListener("click", send);
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

document.getElementById("new-chat-btn").addEventListener("click", async () => {
  await fetch(API + "/new-chat", { method: "POST" });
  chatBox.innerHTML = "";
  loadChatList();
});

// Voice input — always listening with wake word "MJ"
const micBtn = document.getElementById("mic-btn");
const micStatus = document.getElementById("mic-status");
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let listening = false;
let wakeDetected = false;

function setMicStatus(text, cls) {
  micStatus.textContent = text;
  micStatus.className = cls || "";
  micStatus.id = "mic-status";
}

if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.lang = "hi-IN";
  recognition.continuous = false;
  recognition.interimResults = true;

  function startListening() {
    listening = true;
    micBtn.classList.add("recording");
    wakeDetected = false;
    setMicStatus("Listening... say \"MJ\" to activate", "wake");
    try { recognition.start(); } catch(e) {}
  }

  function stopListening() {
    listening = false;
    micBtn.classList.remove("recording");
    setMicStatus("Mic: off");
    try { recognition.stop(); } catch(e) {}
  }

  micBtn.addEventListener("click", () => {
    if (listening) stopListening();
    else startListening();
  });

  recognition.onresult = (e) => {
    let transcript = "";
    for (let i = 0; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    const lower = transcript.toLowerCase();

    // Show what mic is hearing
    setMicStatus("Heard: " + transcript, "command");

    // Check if final result
    const isFinal = e.results[e.results.length - 1].isFinal;
    if (!isFinal) return;

    // Check for wake word "MJ" anywhere in speech
    const wakePatterns = ["mj", "m.j", "em j", "hey mj", "ok mj", "emj", "m j"];
    let hasWake = wakePatterns.some(w => lower.includes(w));

    if (hasWake) {
      // Extract command after wake word
      let command = transcript;
      for (const w of ["MJ", "mj", "M.J", "m.j", "em j", "hey MJ", "ok MJ", "emj", "Hey MJ", "OK MJ"]) {
        command = command.replace(new RegExp(w, "gi"), "").trim();
      }

      if (command.length > 1) {
        // Wake word + command in same sentence
        input.value = command;
        send();
      } else {
        // Only wake word said, wait for next sentence as command
        wakeDetected = true;
        setMicStatus("MJ activated! Speak your command...", "command");
      }
    } else if (wakeDetected) {
      // Previous round had wake word, this is the command
      input.value = transcript.trim();
      wakeDetected = false;
      send();
    }
  };

  recognition.onend = () => {
    if (listening) {
      // Auto-restart after a short pause
      setTimeout(() => {
        if (listening) {
          if (!wakeDetected) setMicStatus("Listening... say \"MJ\" to activate", "wake");
          try { recognition.start(); } catch(e) {}
        }
      }, 200);
    }
  };

  recognition.onerror = (e) => {
    if (e.error === "no-speech") {
      setMicStatus("No speech detected, still listening...", "wake");
    } else if (e.error !== "aborted") {
      setMicStatus("Mic error: " + e.error);
    }
  };

  // Auto-start
  startListening();
} else {
  micBtn.style.display = "none";
  setMicStatus("Speech recognition not supported in this browser");
}

// Text to Speech — Natural female voice via Edge TTS (server-side)
let mjAudio = null;

async function speakText(text, emotion) {
  // Stop any playing audio
  if (mjAudio) { mjAudio.pause(); mjAudio = null; }

  try {
    const res = await fetch(API + "/speak", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: text, emotion: emotion || "neutral" }),
    });

    if (!res.ok) return;
    const data = await res.json();

    mjAudio = new Audio(API + data.audio_url);
    mjAudio.play();
  } catch (e) {
    console.log("TTS error:", e);
  }
}

input.focus();
</script>
</body>
</html>
